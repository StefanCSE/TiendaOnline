<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda</title>
  <style>
    body { 
        font-family: sans-serif; 
        padding: 20px; 
        color: #333; 
        background: #fff; 
        line-height: 1.5; 
    }
    .grid { 
        display: flex; 
        flex-wrap: wrap; 
        gap: 20px; 
    }
    .card { 
        border: 1px solid #eee; 
        padding: 15px; 
        width: 300px; 
        border-radius: 4px; 
    }
    h2 { 
        font-size: 12px; 
        text-transform: uppercase; 
        margin-bottom: 10px; 
        color: #999; 
    }
    label { 
        display: block; 
        font-size: 11px; 
        margin-top: 8px; 
    }
    input { 
        width: 100%; 
        border: 1px solid #ddd; 
        padding: 5px; 
        margin-top: 2px; 
        box-sizing: border-box; 
    }
    button { 
        width: 100%; 
        margin-top: 15px; 
        padding: 8px; 
        cursor: pointer; 
        border: 1px solid #333; 
        background: #fff; 
    }
    button:hover { 
        background: #f5f5f5; 
    }
    .response { 
        margin-top: 10px; 
        font-size: 11px; 
        font-family: monospace; 
        padding: 8px; 
        background: #fafafa; 
        border-radius: 3px; 
        min-height: 20px; 
    }
  </style>
</head>
<body>
  <h1>Tienda</h1>
  <div class="grid">
    <div class="card">
      <span class="tag post">POST</span>
      <h2>/products - Crear Producto</h2>
      <label>name</label>
      <input id="p-name" type="text" placeholder="Laptop" />
      <label>price</label>
      <input id="p-price" type="number" placeholder="999.99" />
      <label>stock</label>
      <input id="p-stock" type="number" placeholder="10" />
      <button onclick="createProduct()">Enviar</button>
      <div class="response" id="res-create-product">--</div>
    </div>
    <div class="card">
      <span class="tag get">GET</span>
      <h2>/products - Listar Productos</h2>
      <button onclick="getProducts()" style="margin-top:0">Enviar</button>
      <div class="response" id="res-get-products">--</div>
    </div>
    <div class="card">
      <span class="tag post">POST</span>
      <h2>/cart - Agregar al Carrito</h2>
      <label>productId</label>
      <input id="c-id" type="text" placeholder="64a1b2c3d4e5f6a7b8c9d0e1" />
      <label>quantity</label>
      <input id="c-qty" type="number" placeholder="2" />
      <button onclick="addToCart()">Enviar</button>
      <div class="response" id="res-add-cart">--</div>
    </div>
    <div class="card">
      <span class="tag get">GET</span>
      <h2>/cart - Ver Carrito</h2>
      <button onclick="getCart()" style="margin-top:0">Enviar</button>
      <div class="response" id="res-get-cart">--</div>
    </div>
    <div class="card">
      <span class="tag post">POST</span>
      <h2>/checkout - Realizar Pago</h2>
      <button onclick="checkout()" style="margin-top:0">Enviar</button>
      <div class="response" id="res-checkout">--</div>
    </div>

  </div>

  <script>
    const BASE = window.location.origin;

    async function call(method, endpoint, body, resId) {
      const el = document.getElementById(resId);
      el.className = "response";
      el.textContent = "Cargando...";
      try {
        const opts = { method, headers: { "Content-Type": "application/json" } };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(BASE + endpoint, opts);
        const data = await res.json();
        el.textContent = JSON.stringify(data, null, 2);
        if (!res.ok) el.className = "response error";
      } catch (e) {
        el.className = "response error";
        el.textContent = "Error: " + e.message;
      }
    }

    function createProduct() {
      call("POST", "/products", {
        name: document.getElementById("p-name").value,
        price: parseFloat(document.getElementById("p-price").value),
        stock: parseInt(document.getElementById("p-stock").value)
      }, "res-create-product");
    }

    function getProducts() {
      call("GET", "/products", null, "res-get-products");
    }

    function addToCart() {
      call("POST", "/cart", {
        productId: document.getElementById("c-id").value,
        quantity: parseInt(document.getElementById("c-qty").value)
      }, "res-add-cart");
    }

    function getCart() {
      call("GET", "/cart", null, "res-get-cart");
    }

    function checkout() {
      call("POST", "/checkout", null, "res-checkout");
    }
  </script>
</body>
</html>
